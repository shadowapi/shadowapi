version: "3"

tasks:
  init:
    desc: "Check if precondition is functioning correctly, install frontend deps, build sqlc image"
    deps:
      - front-init
    cmds:
      - docker build -t sa-sqlc -f ./devops/sqlc.Dockerfile .

  front-init:
    desc: "Install frontend dependencies"
    dir: ./front
    cmds:
      - npm install

  clean:
    desc: "Clean docker compose and volumes"
    cmds:
      - docker compose down -v --rmi all --remove-orphans

  dev-up:
    desc: "Spin up all services in development mode"
    cmds:
      - docker compose watch

  no-cache:
    desc: "Rebuild container with no cache"
    cmds:
      - docker-compose build --no-cache

  dev-down:
    desc: "Take down development services"
    cmds:
      - docker compose down

  setup-zitadel:
    desc: "Setup Zitadel service user for Management API access"
    cmds:
      - echo "🚀 Setting up Zitadel service user..."
      - docker compose --profile setup up zitadel-setup
      - echo "✅ Service user setup completed!"
      - echo "📋 Check ./secrets/zitadel-service-key.json for the generated key"
      - echo "🔄 To enable Zitadel user management, set SA_AUTH_USER_MANAGER=zitadel"

  enable-zitadel-auth:
    desc: "Enable Zitadel authentication for user management"
    deps:
      - setup-zitadel
    cmds:
      - echo "🔄 Enabling Zitadel authentication..."
      - |
        if [ -f ./secrets/zitadel-service-key.json ]; then
          USER_ID=$(cat ./secrets/zitadel-service-key.json | grep -o '"userId":"[^"]*"' | cut -d'"' -f4)
          echo "Setting environment variables..."
          echo "SA_AUTH_USER_MANAGER=zitadel" >> .env
          echo "SA_AUTH_ZITADEL_SERVICE_USER_ID=$USER_ID" >> .env
          echo "✅ Zitadel authentication enabled!"
          echo "🔄 Restart the backend to apply changes: task dev-down && task dev-up"
        else
          echo "❌ Service user key not found. Run 'task setup-zitadel' first."
          exit 1
        fi

  disable-zitadel-auth:
    desc: "Disable Zitadel authentication (use database instead)"
    cmds:
      - echo "🔄 Disabling Zitadel authentication..."
      - sed -i.bak '/SA_AUTH_USER_MANAGER=zitadel/d' .env || true
      - sed -i.bak '/SA_AUTH_ZITADEL_SERVICE_USER_ID=/d' .env || true
      - echo "SA_AUTH_USER_MANAGER=db" >> .env
      - echo "✅ Database authentication enabled!"
      - echo "🔄 Restart the backend to apply changes: task dev-down && task dev-up"

  clean-zitadel-keys:
    desc: "Clean up generated Zitadel service keys"
    cmds:
      - echo "🗑️  Cleaning up Zitadel service keys..."
      - rm -rf ./secrets/
      - echo "✅ Keys cleaned up!"

  prod-up:
    desc: "Spin up all services in production mode"
    cmds:
      - docker compose -f ./docker-compose.prod.yaml build
      - docker compose -f ./docker-compose.prod.yaml up -d

  prod-down:
    desc: "Take down production services"
    cmds:
      - docker compose -f ./docker-compose.prod.yaml down

  build-api:
    desc: "Build API backend binary locally"
    cmds:
      - go build -o ./bin/shadowapi ./cmd/shadowapi

  shell:
    desc: "Open a development shell in the backend container"
    cmds:
      - docker compose exec backend bash -l

  db-shell:
    desc: "Open Postgres shell in the container"
    cmds:
      - docker compose exec db su - postgres -c "psql -U shadowapi shadowapi"

  sync-db:
    desc: "Migrate database to latest changes using Atlas in the dev environment"
    cmds:
      - |2
        cat ./db/schema.sql ./db/tg.sql > ./db/combined.sql
        docker run --rm \
          --network shadowapi_shadowapi \
          -v ./db/combined.sql:/combined.sql \
          --name sa-atlas arigaio/atlas \
          schema apply \
            --url postgres://shadowapi:shadowapi@db:5432/shadowapi?sslmode=disable \
            --dev-url postgres://shadowapi:shadowapi@db:5432/shadowapi_schema?sslmode=disable \
            --to file://combined.sql \
            --auto-approve
        rm ./db/combined.sql

  sqlc:
    desc: "Regenerate SQL queries package"
    cmds:
      - |2
        docker run --rm \
        -v ./db:/db -v ./backend/pkg:/pkg -w /db \
        --name sa-sqlc sa-sqlc generate
    preconditions:
      - sh: docker images | grep sa-sqlc

  sqlc-vet:
    desc: "Validate SQL queries"
    cmds:
      - |2
        docker run --rm \
        -v ./db:/db -v ./backend/pkg:/pkg -w /db \
        --name sa-sqlc sa-sqlc vet
    preconditions:
      - sh: docker images | grep sa-sqlc

  api-gen-backend:
    desc: "Generate API specification in backend"
    dir: ./backend
    cmds:
      - go generate

  api-gen-frontend:
    desc: "Generate TypeScript API client in frontend"
    dir: ./front
    cmds:
      - npm run generate-api-client

  api-gen:
    desc: "Generate API specs (backend & frontend)"
    deps:
      - api-gen-backend
      - api-gen-frontend

  playwright-run:
    desc: "Run Playwright tests"
    dir: ./front
    cmds:
      - npx playwright test

  playwright-report:
    desc: "Generate and open Playwright test report"
    dir: ./front
    cmds:
      - npx playwright show-report

  local-certs:
    desc: "Generate local ssl certs"
    cmds:
      - openssl req -x509 -nodes -newkey rsa:2048 -days 365 -keyout localtest.me.key -out localtest.me.crt -subj "/CN=localtest.me"

  backend-loader:
    desc: "Run the prebuilt loader command inside backend container"
    cmds:
      - >-
        docker compose run --rm backend-loader
