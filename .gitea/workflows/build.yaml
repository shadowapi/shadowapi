name: Build and Deploy

on:
  push:
    branches: [main, v3]
    tags: ['v*']
  pull_request:
    branches: [main, v3]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.devinlab.com
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITEATOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: git.devinlab.com/shadowapi/shadowapi-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for ssr
        id: meta-ssr
        uses: docker/metadata-action@v5
        with:
          images: git.devinlab.com/shadowapi/shadowapi-ssr
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for grpc2nats
        id: meta-grpc2nats
        uses: docker/metadata-action@v5
        with:
          images: git.devinlab.com/shadowapi/shadowapi-grpc2nats
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: git.devinlab.com/shadowapi/shadowapi-worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for migrate
        id: meta-migrate
        uses: docker/metadata-action@v5
        with:
          images: git.devinlab.com/shadowapi/shadowapi-migrate
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/backend/prod.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push ssr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/ssr/prod.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ssr.outputs.tags }}
          labels: ${{ steps.meta-ssr.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_OIDC_URL=${{ secrets.VITE_OIDC_URL }}
            VITE_ROOT_URL=${{ secrets.VITE_ROOT_URL }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
          cache-from: type=gha,scope=ssr
          cache-to: type=gha,scope=ssr,mode=max

      - name: Build and push grpc2nats
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/grpc2nats/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-grpc2nats.outputs.tags }}
          labels: ${{ steps.meta-grpc2nats.outputs.labels }}
          cache-from: type=gha,scope=grpc2nats
          cache-to: type=gha,scope=grpc2nats,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/worker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build and push migrate
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/migrate/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-migrate.outputs.tags }}
          labels: ${{ steps.meta-migrate.outputs.labels }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,scope=migrate,mode=max

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: dtzar/helm-kubectl:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Deploy with Helm
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          helm upgrade --install meshpump ./k8s/meshpump \
            -n meshpump \
            -f ./k8s/meshpump/values/production.yaml \
            --set images.tag=${IMAGE_TAG} \
            --atomic \
            --timeout 10m
