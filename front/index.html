<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeshPump</title>
    <style>
      /* Pre-React loading indicator - displays before JS loads */
      .pre-react-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .pre-react-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e8e8e8;
        border-top-color: #1677ff;
        border-radius: 50%;
        animation: pre-react-spin 0.8s linear infinite;
      }
      @keyframes pre-react-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!--ssr-styles-->
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <!--ssr-data-->
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
