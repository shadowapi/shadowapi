apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shadowapi

resources:
  - ../../base

patchesStrategicMerge:
  - patches/replica-count.yaml
  - patches/resources.yaml

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: frontend
    path: patches/frontend-env.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: backend
    path: patches/backend-env.yaml

commonLabels:
  environment: production

