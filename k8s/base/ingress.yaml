apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shadowapi-ingress
  namespace: shadowapi
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - shadowapi.devinlab.com
    secretName: shadowapi-tls
  rules:
  - host: shadowapi.devinlab.com
    http:
      paths:
      # API routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
      - path: /assets
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
      # Kratos public auth routes only
      - path: /auth/user
        pathType: Prefix
        backend:
          service:
            name: kratos-public
            port:
              number: 4433
      # Frontend (catch-all)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80