apiVersion: v1
kind: Secret
metadata:
  name: shadowapi-postgres
  namespace: shadowapi
type: Opaque
stringData:
  # External PostgreSQL connection details
  POSTGRES_USER: "PLACEHOLDER_POSTGRES_USER"
  POSTGRES_PASSWORD: "PLACEHOLDER_POSTGRES_PASSWORD"
  POSTGRES_HOST: "PLACEHOLDER_POSTGRES_HOST"
  POSTGRES_PORT: "PLACEHOLDER_POSTGRES_PORT"
  POSTGRES_DB: "PLACEHOLDER_POSTGRES_DB"
  POSTGRES_DB_KRATOS: "PLACEHOLDER_POSTGRES_DB_KRATOS"
  # Connection strings
  SA_DB_URI: "postgres://PLACEHOLDER_POSTGRES_USER:PLACEHOLDER_POSTGRES_PASSWORD@PLACEHOLDER_POSTGRES_HOST:PLACEHOLDER_POSTGRES_PORT/PLACEHOLDER_POSTGRES_DB?sslmode=disable"
  KRATOS_DSN: "postgres://PLACEHOLDER_POSTGRES_USER:PLACEHOLDER_POSTGRES_PASSWORD@PLACEHOLDER_POSTGRES_HOST:PLACEHOLDER_POSTGRES_PORT/PLACEHOLDER_POSTGRES_DB_KRATOS?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: shadowapi-kratos
  namespace: shadowapi
type: Opaque
stringData:
  SECRETS_DEFAULT: "PLACEHOLDER_KRATOS_SECRET_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: shadowapi-app
  namespace: shadowapi
type: Opaque
stringData:
  SA_BASE_URL: "https://shadowapi.devinlab.com"
  TG_APP_ID: "PLACEHOLDER_TG_APP_ID"
  TG_APP_HASH: "PLACEHOLDER_TG_APP_HASH"