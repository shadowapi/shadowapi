apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meshpump.fullname" . }}-grpc2nats
  labels:
    {{- include "meshpump.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "meshpump.grpc2natsSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "meshpump.grpc2natsSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "meshpump.serviceAccountName" . }}
      containers:
        - name: grpc2nats
          image: "{{ .Values.images.registry }}/shadowapi-grpc2nats:{{ .Values.images.tag }}"
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "meshpump.fullname" . }}-config
          env:
            - name: G2N_DB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: DATABASE_URL
            - name: G2N_NATS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret }}
                  key: NATS_URL
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.grpc2nats | nindent 12 }}
