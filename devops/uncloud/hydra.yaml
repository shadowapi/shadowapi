# Ory Hydra Configuration for Uncloud Deployment
# Domain: meshpump.com
version: v2.2.0

serve:
  cookies:
    same_site_mode: Lax
    # Leading dot allows cookies across all subdomains
    domain: .meshpump.com

  public:
    cors:
      enabled: true
      allowed_origins:
        - https://meshpump.com
        - https://app.meshpump.com
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - Accept
      exposed_headers:
        - Content-Type
      allow_credentials: true

urls:
  self:
    # Issuer URL must match the OIDC discovery endpoint
    issuer: https://oidc.meshpump.com
  # Login and consent are handled by the backend on api subdomain
  login: https://api.meshpump.com/api/v1/auth/login
  consent: https://api.meshpump.com/api/v1/auth/consent
  logout: https://api.meshpump.com/api/v1/auth/oauth2/logout
  error: https://api.meshpump.com/auth/error
  post_logout_redirect: https://meshpump.com/

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      salt: ${OIDC_PAIRWISE_SALT}
  dynamic_client_registration:
    enabled: false

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m
  login_consent_request: 30m

oauth2:
  expose_internal_errors: false
  hashers:
    bcrypt:
      cost: 10

log:
  level: info
  format: json
  leak_sensitive_values: false

strategies:
  access_token: jwt
  scope: wildcard
