# MeshPump Uncloud Deployment
# Domain: meshpump.com
#
# Deploy with: uncloud deploy -f compose.yaml
# External dependencies: PostgreSQL (managed), NATS (external)

services:
  # SSR Server handles all frontend routes (both SSR and CSR)
  # SSR pages get server-rendered for SEO, CSR pages hydrate on client
  mp-ssr:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/ssr/prod.Dockerfile
      args:
        - VITE_API_BASE_URL=https://api.meshpump.com/api/v1
        - VITE_OIDC_URL=https://meshpump.oidc.oxoauth.com
        - VITE_ROOT_URL=https://meshpump.com
        - VITE_APP_URL=https://meshpump.com
    x-ports:
      - meshpump.com:3000/https
    restart: always

  # Backend API (Go)
  mp-backend:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/backend/prod.Dockerfile
    x-ports:
      - api.meshpump.com:8080/https
    environment:
      - BE_HOST=0.0.0.0
      - BE_PORT=8080
      - BE_LOG_LEVEL=${BE_LOG_LEVEL:-INFO}
      - BE_LOG_FORMAT=json
      # External PostgreSQL (managed)
      - BE_DB_URI=${BE_DB_URI}
      # External NATS
      - BE_QUEUE_URL=${BE_QUEUE_URL}
      - BE_QUEUE_PREFIX=${BE_QUEUE_PREFIX:-shadowapi}
      # OIDC configuration (oxoauth.com)
      - BE_OIDC_ISSUER=https://meshpump.oidc.oxoauth.com
      - BE_OIDC_CALLBACK_SECRET=${BE_OIDC_CALLBACK_SECRET}
      - BE_OIDC_CLIENT_ID=${BE_OIDC_CLIENT_ID}
      - BE_JWKS_CACHE_DURATION=${BE_JWKS_CACHE_DURATION:-300}
      # Cookie configuration (leading dot for cross-subdomain)
      - BE_OIDC_COOKIE_DOMAIN=.meshpump.com
      - BE_OIDC_COOKIE_SECURE=true
      # Initial admin user
      - BE_INIT_ADMIN_EMAIL=${BE_INIT_ADMIN_EMAIL}
      - BE_INIT_ADMIN_PASSWORD=${BE_INIT_ADMIN_PASSWORD}
      # URLs
      - BE_BASE_URL=https://meshpump.com
      - BE_CSR_BASE_URL=https://meshpump.com
      - BE_API_BASE_URL=https://api.meshpump.com
      - BE_CORS_ALLOWED_ORIGINS=https://meshpump.com
      # SMTP / Amazon SES
      - BE_SMTP_HOST=${BE_SMTP_HOST}
      - BE_SMTP_PORT=${BE_SMTP_PORT}
      - BE_SMTP_USERNAME=${BE_SMTP_USERNAME}
      - BE_SMTP_PASSWORD=${BE_SMTP_PASSWORD}
      - BE_SMTP_FROM=${BE_SMTP_FROM}
      - BE_SMTP_FROM_NAME=${BE_SMTP_FROM_NAME}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # gRPC to NATS bridge for distributed workers
  mp-grpc2nats:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/grpc2nats/Dockerfile
    x-caddy: |
      rpc.meshpump.com {
        reverse_proxy h2c://mp-grpc2nats.internal:9090
      }
    environment:
      - G2N_DB_URI=${BE_DB_URI}
      - G2N_NATS_URL=${BE_QUEUE_URL}
      - G2N_NATS_PREFIX=${BE_QUEUE_PREFIX}
      - G2N_GRPC_HOST=0.0.0.0
      - G2N_GRPC_PORT=9090
      - G2N_LOG_LEVEL=${BE_LOG_LEVEL:-info}
      - G2N_LOG_FORMAT=json
    restart: always

  # Worker on olymp machine
  mp-worker-olymp:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/worker/Dockerfile
    x-node: olymp
    volumes:
      - worker_olymp_data:/data
    environment:
      - WORKER_SERVER=mp-grpc2nats.internal:9090
      - WORKER_TLS=false
      - WORKER_NAME=olymp
      - ENROLLMENT_TOKEN=${ENROLLMENT_TOKEN_OLYMP}
      - WORKER_LOG_LEVEL=${BE_LOG_LEVEL:-info}
      - WORKER_LOG_FORMAT=json
    depends_on:
      mp-grpc2nats:
        condition: service_started
    restart: unless-stopped

  # Worker on shkhara machine
  mp-worker-shkhara:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/worker/Dockerfile
    x-node: shkhara
    volumes:
      - worker_shkhara_data:/data
    environment:
      - WORKER_SERVER=mp-grpc2nats.internal:9090
      - WORKER_TLS=false
      - WORKER_NAME=shkhara
      - ENROLLMENT_TOKEN=${ENROLLMENT_TOKEN_SHKHARA}
      - WORKER_LOG_LEVEL=${BE_LOG_LEVEL:-info}
      - WORKER_LOG_FORMAT=json
    depends_on:
      mp-grpc2nats:
        condition: service_started
    restart: unless-stopped

volumes:
  worker_olymp_data:
    driver: local
  worker_shkhara_data:
    driver: local
