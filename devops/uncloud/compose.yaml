# MeshPump Uncloud Deployment
# Domain: meshpump.com
#
# Deploy with: uncloud deploy -f compose.yaml
# External dependencies: PostgreSQL (managed), NATS (external)

configs:
  hydra_config:
    file: ./hydra.yaml

services:
  # Frontend SPA (Vite React) - on app subdomain
  mp-frontend:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/frontend/prod.Dockerfile
      args:
        - VITE_API_BASE_URL=https://api.meshpump.com/api/v1
        - VITE_OIDC_URL=https://oidc.meshpump.com
        - VITE_ROOT_URL=https://meshpump.com
        - VITE_APP_URL=https://app.meshpump.com
    x-ports:
      - app.meshpump.com:5173/https
    restart: always

  # SSR Server (Express + Vite) - on root domain
  mp-ssr:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/ssr/prod.Dockerfile
      args:
        - VITE_API_BASE_URL=https://api.meshpump.com/api/v1
        - VITE_OIDC_URL=https://oidc.meshpump.com
        - VITE_ROOT_URL=https://meshpump.com
        - VITE_APP_URL=https://app.meshpump.com
    x-ports:
      - meshpump.com:3000/https
    restart: always

  # Backend API (Go)
  mp-backend:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/backend/prod.Dockerfile
    x-ports:
      - api.meshpump.com:8080/https
      - rpc.meshpump.com:9090/https
    depends_on:
      mp-hydra:
        condition: service_healthy
    environment:
      - BE_HOST=0.0.0.0
      - BE_PORT=8080
      - BE_LOG_LEVEL=${BE_LOG_LEVEL:-INFO}
      # External PostgreSQL (managed)
      - BE_DB_URI=${BE_DB_URI}
      # External NATS
      - BE_QUEUE_URL=${BE_QUEUE_URL}
      - BE_QUEUE_PREFIX=${BE_QUEUE_PREFIX:-shadowapi}
      # Hydra OAuth2 configuration
      - BE_HYDRA_PUBLIC_URL=https://oidc.meshpump.com
      - BE_HYDRA_ADMIN_URL=http://mp-hydra.internal:4445
      - BE_OAUTH2_SPA_CLIENT_ID=${BE_OAUTH2_SPA_CLIENT_ID}
      - BE_JWKS_CACHE_DURATION=${BE_JWKS_CACHE_DURATION:-300}
      # OAuth2 cookie configuration (leading dot for cross-subdomain)
      - BE_OAUTH2_COOKIE_DOMAIN=.meshpump.com
      - BE_OAUTH2_COOKIE_SECURE=true
      # Initial admin user
      - BE_INIT_ADMIN_EMAIL=${BE_INIT_ADMIN_EMAIL}
      - BE_INIT_ADMIN_PASSWORD=${BE_INIT_ADMIN_PASSWORD}
      # URLs
      - BE_BASE_URL=https://meshpump.com
      - BE_CSR_BASE_URL=https://app.meshpump.com
      - BE_API_BASE_URL=https://api.meshpump.com
      - BE_CORS_ALLOWED_ORIGINS=https://meshpump.com,https://app.meshpump.com
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # Hydra OAuth2/OIDC Server
  # Note: Migrations run inline at startup via entrypoint script
  mp-hydra:
    image: oryd/hydra:v2.2.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        hydra migrate sql -e --yes && hydra serve all --config /hydra.yaml
    x-ports:
      - oidc.meshpump.com:4444/https
    environment:
      - DSN=${HYDRA_DSN}
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM}
      - LOG_LEVEL=${HYDRA_LOG_LEVEL:-info}
      - OIDC_PAIRWISE_SALT=${OIDC_PAIRWISE_SALT}
    configs:
      - source: hydra_config
        target: /hydra.yaml
        mode: 0644
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4445/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # gRPC to NATS bridge for distributed workers (internal service)
  mp-grpc2nats:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/grpc2nats/Dockerfile
    environment:
      - G2N_DB_URI=${BE_DB_URI}
      - G2N_NATS_URL=${BE_QUEUE_URL}
      - G2N_NATS_PREFIX=${BE_QUEUE_PREFIX}
      - G2N_GRPC_HOST=0.0.0.0
      - G2N_GRPC_PORT=9090
      - G2N_LOG_LEVEL=${BE_LOG_LEVEL:-info}
    restart: always

  # Worker on olymp machine
  mp-worker-olymp:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/worker/Dockerfile
    x-node: olymp
    environment:
      - WORKER_SERVER=mp-grpc2nats.internal:9090
      - WORKER_TLS=false
      - WORKER_NAME=olymp
      - ENROLLMENT_TOKEN=${ENROLLMENT_TOKEN_OLYMP}
      - WORKER_LOG_LEVEL=${BE_LOG_LEVEL:-info}
    depends_on:
      mp-grpc2nats:
        condition: service_started
    restart: unless-stopped

  # Worker on shkhara machine
  mp-worker-shkhara:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: devops/docker/worker/Dockerfile
    x-node: shkhara
    environment:
      - WORKER_SERVER=mp-grpc2nats.internal:9090
      - WORKER_TLS=false
      - WORKER_NAME=shkhara
      - ENROLLMENT_TOKEN=${ENROLLMENT_TOKEN_SHKHARA}
      - WORKER_LOG_LEVEL=${BE_LOG_LEVEL:-info}
    depends_on:
      mp-grpc2nats:
        condition: service_started
    restart: unless-stopped
