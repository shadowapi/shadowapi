version: v2.2.0

serve:
  cookies:
    same_site_mode: Lax
    # Leading dot allows cookies across all subdomains
    domain: .${BE_DOMAIN}

  public:
    cors:
      enabled: true
      allowed_origins:
        - ${BE_PROTOCOL}://${BE_DOMAIN}
        - ${BE_PROTOCOL}://${BE_SSR_SUBDOMAIN}.${BE_DOMAIN}
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - Accept
      exposed_headers:
        - Content-Type
      allow_credentials: true

urls:
  self:
    # Issuer URL must match the OIDC discovery endpoint
    issuer: ${BE_PROTOCOL}://${BE_OIDC_SUBDOMAIN}.${BE_DOMAIN}
  # Login and consent are handled by the backend on api subdomain
  login: ${BE_PROTOCOL}://${BE_API_SUBDOMAIN}.${BE_DOMAIN}/api/v1/auth/login
  consent: ${BE_PROTOCOL}://${BE_API_SUBDOMAIN}.${BE_DOMAIN}/api/v1/auth/consent
  logout: ${BE_PROTOCOL}://${BE_API_SUBDOMAIN}.${BE_DOMAIN}/api/v1/auth/oauth2/logout
  error: ${BE_PROTOCOL}://${BE_API_SUBDOMAIN}.${BE_DOMAIN}/auth/error
  post_logout_redirect: ${BE_PROTOCOL}://${BE_DOMAIN}/

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      salt: ${OIDC_PAIRWISE_SALT}
  dynamic_client_registration:
    enabled: false

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m
  login_consent_request: 30m

oauth2:
  expose_internal_errors: true
  hashers:
    bcrypt:
      cost: 10

log:
  level: debug
  format: text
  leak_sensitive_values: true

strategies:
  access_token: jwt
  scope: wildcard
