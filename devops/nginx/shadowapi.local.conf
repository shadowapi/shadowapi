# ShadowAPI local dev nginx config
# Backend (Go) on :8090, Frontend (Vite) on :5174
#
# Install:
#   bash devops/scripts/install-macos-shadowapi.local-certs.sh
# Or manually:
#   ln -s $(pwd)/devops/nginx/shadowapi.local.conf /opt/homebrew/etc/nginx/servers/shadowapi.local.conf
#   brew services restart nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name shadowapi.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name shadowapi.local;

    ssl_certificate     /opt/homebrew/etc/nginx/ssl/shadowapi.local.crt;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/shadowapi.local.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

    # ---------- Backend API ----------
    # /api/*, /session, /assets/docs/api/*

    location /api {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /session {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/docs/api {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---------- Backend Auth ----------
    # POST /login, /login/zitadel, /auth/callback, /logout, /logout/callback

    location = /login {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # POST /login → backend, GET /login → Vite SPA
        set $upstream http://localhost:5174;
        if ($request_method = POST) {
            set $upstream http://localhost:8090;
        }
        proxy_pass $upstream;
    }

    location /login/zitadel {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/callback {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Frontend (Vite dev server) ----------
    # Everything else → Vite on :5174

    location / {
        proxy_pass http://localhost:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
}
