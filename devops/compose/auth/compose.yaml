services:
  # Hydra database migration (runs once on startup)
  hydra-migrate:
    image: oryd/hydra:v2.2.0
    command: migrate sql -e --yes
    environment:
      - DSN=${HYDRA_DSN}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - default

  # Hydra OAuth2/OIDC server
  hydra:
    image: oryd/hydra:v2.2.0
    command: serve all --dev --config /etc/config/hydra.yaml
    environment:
      - DSN=${HYDRA_DSN}
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM}
      - LOG_LEVEL=${HYDRA_LOG_LEVEL:-info}
    volumes:
      - ../../ory/hydra:/etc/config:ro
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4445/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      # OIDC subdomain routes all Hydra traffic (oauth2 and well-known endpoints)
      - traefik.http.routers.hydra.rule=Host(`${BE_OIDC_SUBDOMAIN}.${BE_DOMAIN}`)
      - traefik.http.routers.hydra.entrypoints=${BE_TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.hydra.service=hydra
      - traefik.http.services.hydra.loadbalancer.server.port=4444
    restart: unless-stopped
    networks:
      - default
