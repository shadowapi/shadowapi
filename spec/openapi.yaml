---
openapi: 3.1.0
info:
  title: ShadowAPI
  version: 0.0.2
  description: ShadowAPI server

tags:
  - name: auth
    description: Authentication and authorization endpoints for user login and session management.
  - name: datasource
    description: Generic datasource operations for listing and managing data sources.
  - name: datasource-email
    description: Email datasource configuration using IMAP/SMTP credentials.
  - name: datasource-email-oauth
    description: Email datasource configuration using OAuth2 authentication.
  - name: mapper
    description: Field mapping and data transformation configuration.
  - name: NATS
    description: NATS messaging queue operations for viewing and managing messages.
  - name: oauth2
    description: OAuth2 client and token management for external service authentication.
  - name: oauth2-auth
    description: OAuth2 authentication flow endpoints for datasource authorization.
  - name: pipeline
    description: Data processing pipeline configuration and management.
  - name: RBAC
    description: Role-based access control for managing roles and permissions.
  - name: scheduler
    description: Job scheduling for automated pipeline execution.
  - name: storage
    description: Generic storage operations for listing and managing storage backends.
  - name: storage-postgres
    description: PostgreSQL storage backend configuration and table management.
  - name: storage-s3
    description: S3-compatible object storage backend configuration.
  - name: syncpolicy
    description: Synchronization policy configuration for data source sync rules.
  - name: test-connection
    description: Connection testing for validating storage and datasource configurations.
  - name: token
    description: OAuth2 token management for datasource authentication.
  - name: worker-jobs
    description: Background job monitoring and management.

