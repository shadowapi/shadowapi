get:
  summary: Get policy sets for a user
  operationId: getUserPolicySets
  tags:
    - access
  parameters:
    - in: path
      name: user_uuid
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID
    - in: query
      name: domain
      schema:
        type: string
      description: Filter by domain (workspace slug or "global")
  responses:
    "200":
      description: User policy sets
      content:
        application/json:
          schema:
            type: object
            properties:
              user_uuid:
                type: string
                format: uuid
              policy_sets:
                type: array
                items:
                  $ref: "../openapi.yaml#/components/schemas/UserPolicySetAssignment"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

post:
  summary: Assign a policy set to a user
  operationId: assignPolicySetToUser
  tags:
    - access
  parameters:
    - in: path
      name: user_uuid
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            policy_set_name:
              type: string
              description: Name of the policy set to assign
            domain:
              type: string
              description: Domain for the policy set (workspace slug or "global")
          required:
            - policy_set_name
            - domain
  responses:
    "201":
      description: Policy set assigned successfully
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
