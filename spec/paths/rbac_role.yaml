get:
  summary: List all roles
  operationId: listRoles
  tags:
    - RBAC
  parameters:
    - in: query
      name: scope
      schema:
        type: string
        enum: [global, workspace]
      description: Filter roles by scope
  responses:
    "200":
      description: List of roles
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/RBACRole"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
post:
  summary: Create a new role
  operationId: createRole
  tags:
    - RBAC
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/RBACRole"
  responses:
    "201":
      description: Role created successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/RBACRole"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
