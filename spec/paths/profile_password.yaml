put:
  summary: Change current user password
  description: Allows the authenticated user to change their own password by providing the current password for verification.
  operationId: changePassword
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PasswordChange"
  responses:
    "204":
      description: Password changed successfully
    "400":
      description: Validation error (password too short, etc.)
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    "401":
      description: Current password is incorrect or not authenticated
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
  tags:
    - users
    - profile
