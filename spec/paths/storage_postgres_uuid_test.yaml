post:
  description: |
    Initiate a connection test for a PostgreSQL storage.
    Returns a job UUID (202) that can be polled for results.
  operationId: storage-postgres-test
  parameters:
    - description: The UUID of the PostgreSQL storage to test.
      in: path
      name: uuid
      required: true
      schema:
        type: string
  responses:
    "202":
      description: Test job created. Poll the returned job UUID for results.
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/TestConnectionJob"
    default:
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: An error occurred while initiating the connection test.
  tags:
    - storage
    - storage-postgres
    - test-connection
