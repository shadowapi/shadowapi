# spec/paths/auth_login.yaml
post:
  description: Authenticate user with email and password
  operationId: auth-login
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - password
          properties:
            email:
              type: string
              format: email
              description: User email address
            password:
              type: string
              description: User password
  responses:
    "200":
      description: Login successful
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                description: Login status
              session_token:
                type: string
                description: Session token for authentication
    "401":
      description: Invalid credentials
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"