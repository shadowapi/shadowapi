get:
  description: Handle OIDC login redirect. Redirects to frontend login page with auth_request_id.
  operationId: auth-login
  security: []
  parameters:
    - name: auth_request_id
      in: query
      required: true
      schema:
        type: string
      description: The auth request ID from the OIDC provider
  responses:
    "302":
      description: Redirect to login page
      headers:
        Location:
          schema:
            type: string
          description: Redirect URL
    default:
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: Error
  tags:
    - auth

post:
  description: Submit login credentials for OIDC authentication flow
  operationId: auth-login-submit
  security: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            auth_request_id:
              type: string
              description: The auth request ID from the OIDC provider
            email:
              type: string
              description: User email address
            password:
              type: string
              description: User password
          required:
            - auth_request_id
            - email
            - password
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              redirect_to:
                type: string
                description: The URL to redirect the user to
            required:
              - redirect_to
      description: OK
    default:
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: Error
  tags:
    - auth
