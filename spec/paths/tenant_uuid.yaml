get:
  summary: Get a tenant by UUID
  operationId: getTenant
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: Tenant details
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Tenant"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
put:
  summary: Update a tenant
  operationId: updateTenant
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Tenant"
  responses:
    "200":
      description: Tenant updated successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Tenant"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
delete:
  summary: Delete a tenant
  operationId: deleteTenant
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "204":
      description: Tenant deleted successfully
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
