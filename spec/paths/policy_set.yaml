get:
  summary: List all policy sets
  operationId: listPolicySets
  tags:
    - access
  parameters:
    - in: query
      name: scope
      schema:
        type: string
        enum: [global, workspace]
      description: Filter policy sets by scope
  responses:
    "200":
      description: List of policy sets
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/PolicySet"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

post:
  summary: Create a new policy set
  operationId: createPolicySet
  tags:
    - access
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PolicySet"
  responses:
    "201":
      description: Policy set created successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/PolicySet"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
