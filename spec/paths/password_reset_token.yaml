get:
  summary: Validate password reset token (public)
  operationId: getPasswordResetByToken
  security: []
  parameters:
    - in: path
      name: token
      required: true
      schema:
        type: string
      description: Password reset token from email link
  responses:
    "200":
      description: Token is valid
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/PasswordResetInfo"
    "404":
      description: Token not found or expired
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
  tags:
    - auth
