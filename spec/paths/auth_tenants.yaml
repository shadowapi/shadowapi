get:
  summary: List tenants where the current user has an active session
  description: |
    Uses the shared session cookie to find all tenants where the user is authenticated.
    This endpoint is used by the tenant selection page.
  operationId: listAuthenticatedTenants
  security: []
  responses:
    "200":
      description: List of authenticated tenants
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/AuthenticatedTenant"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
