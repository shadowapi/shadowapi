get:
  summary: List all workspaces
  operationId: listWorkspaces
  tags:
    - workspace
  responses:
    "200":
      description: List of workspaces
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/Workspace"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
post:
  summary: Create a new workspace
  operationId: createWorkspace
  tags:
    - workspace
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Workspace"
  responses:
    "201":
      description: Workspace created successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Workspace"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
