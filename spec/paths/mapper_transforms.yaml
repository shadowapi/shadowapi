get:
  summary: List available transform functions
  description: Returns all transform functions that can be applied to field mappings
  operationId: MapperTransformsList
  parameters:
    - name: input_type
      in: query
      description: Filter transforms by compatible input type
      required: false
      schema:
        type: string
        enum: [string, integer, boolean, datetime, array, object]
  responses:
    "200":
      description: List of available transform functions
      content:
        application/json:
          schema:
            type: object
            properties:
              transforms:
                type: array
                items:
                  $ref: "../openapi.yaml#/components/schemas/TransformDefinition"
            required:
              - transforms
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
  tags:
    - mapper
