get:
  summary: List all tenants
  operationId: listTenants
  parameters:
    - name: limit
      in: query
      schema:
        type: integer
        default: 100
    - name: offset
      in: query
      schema:
        type: integer
        default: 0
  responses:
    "200":
      description: List of tenants
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/Tenant"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
post:
  summary: Create a new tenant
  operationId: createTenant
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Tenant"
  responses:
    "201":
      description: Tenant created successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Tenant"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
