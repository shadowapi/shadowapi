get:
  description: List all tables in the PostgreSQL database connected via this storage.
  operationId: storage-postgres-introspect-tables
  parameters:
    - description: The UUID of the PostgreSQL storage instance.
      in: path
      name: uuid
      required: true
      schema:
        type: string
  responses:
    "200":
      content:
        application/json:
          schema:
            $ref: "../components/storage_postgres_introspect.yaml#/StoragePostgresIntrospectTablesResponse"
      description: List of tables in the database.
    default:
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: An error occurred.
  tags:
    - storage
    - storage-postgres
