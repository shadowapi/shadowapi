post:
  summary: Confirm password reset with new password (public)
  operationId: confirmPasswordReset
  security: []
  tags:
    - auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PasswordResetConfirm"
  responses:
    "200":
      description: Password successfully reset
      content:
        application/json:
          schema:
            type: object
            properties:
              redirect_url:
                type: string
                description: URL to redirect user to login
    "400":
      description: Invalid request (weak password, etc.)
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    "404":
      description: Token not found or expired
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
