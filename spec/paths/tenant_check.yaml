get:
  summary: Check if a tenant exists by subdomain name
  operationId: checkTenantExists
  security: []
  parameters:
    - name: name
      in: query
      required: true
      description: Tenant subdomain name to check
      schema:
        type: string
  responses:
    "200":
      description: Tenant existence check result
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/TenantCheck"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
