get:
  summary: List worker enrollment tokens
  operationId: listWorkerEnrollmentTokens
  responses:
    "200":
      description: List of enrollment tokens
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/WorkerEnrollmentToken"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
  tags:
    - workers

post:
  summary: Create worker enrollment token
  operationId: createWorkerEnrollmentToken
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/WorkerEnrollmentToken"
  responses:
    "201":
      description: Enrollment token created successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/WorkerEnrollmentToken"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
  tags:
    - workers
