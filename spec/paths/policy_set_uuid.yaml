get:
  summary: Get policy set details
  operationId: getPolicySet
  tags:
    - access
  parameters:
    - in: path
      name: uuid
      required: true
      schema:
        type: string
        format: uuid
      description: Policy Set UUID
  responses:
    "200":
      description: Policy set details
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/PolicySet"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

put:
  summary: Update a policy set
  operationId: updatePolicySet
  tags:
    - access
  parameters:
    - in: path
      name: uuid
      required: true
      schema:
        type: string
        format: uuid
      description: Policy Set UUID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PolicySet"
  responses:
    "200":
      description: Policy set updated successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/PolicySet"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

delete:
  summary: Delete a policy set
  operationId: deletePolicySet
  tags:
    - access
  parameters:
    - in: path
      name: uuid
      required: true
      schema:
        type: string
        format: uuid
      description: Policy Set UUID
  responses:
    "204":
      description: Policy set deleted successfully
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
