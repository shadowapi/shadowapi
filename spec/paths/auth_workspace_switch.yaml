post:
  description: Switch to a different workspace. Sets a workspace cookie and returns workspace info.
  operationId: auth-workspace-switch
  requestBody:
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            workspace_slug:
              type: string
              description: The slug of the workspace to switch to
          required:
            - workspace_slug
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              workspace_uuid:
                type: string
                description: The UUID of the workspace
              workspace_slug:
                type: string
                description: The slug of the workspace
            required:
              - workspace_uuid
              - workspace_slug
      headers:
        Set-Cookie:
          schema:
            type: string
          description: Workspace cookie
      description: Workspace switched successfully
    "403":
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: User is not a member of the workspace
    "404":
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: Workspace not found
    default:
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
      description: Error
  tags:
    - auth
