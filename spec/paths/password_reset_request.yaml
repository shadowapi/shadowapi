post:
  summary: Request password reset email (public)
  operationId: requestPasswordReset
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PasswordResetRequest"
  responses:
    "200":
      description: Reset email sent (always returns success for security)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Generic success message
    "429":
      description: Rate limited - please wait before requesting again
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
  tags:
    - auth
