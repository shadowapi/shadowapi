get:
  summary: Get a usage limit by UUID
  operationId: getUsageLimit
  tags:
    - access
  parameters:
    - in: path
      name: uuid
      required: true
      schema:
        type: string
        format: uuid
      description: Usage limit UUID
  responses:
    "200":
      description: Usage limit details
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/UsageLimit"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

put:
  summary: Update a usage limit
  operationId: updateUsageLimit
  tags:
    - access
  parameters:
    - in: path
      name: uuid
      required: true
      schema:
        type: string
        format: uuid
      description: Usage limit UUID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/UsageLimit"
  responses:
    "200":
      description: Usage limit updated successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/UsageLimit"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

delete:
  summary: Delete a usage limit
  operationId: deleteUsageLimit
  tags:
    - access
  parameters:
    - in: path
      name: uuid
      required: true
      schema:
        type: string
        format: uuid
      description: Usage limit UUID
  responses:
    "204":
      description: Usage limit deleted successfully
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
