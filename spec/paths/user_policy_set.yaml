delete:
  summary: Remove a policy set from a user
  operationId: removePolicySetFromUser
  tags:
    - access
  parameters:
    - in: path
      name: user_uuid
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID
    - in: path
      name: policy_set_name
      required: true
      schema:
        type: string
      description: Policy set name to remove
    - in: query
      name: domain
      required: true
      schema:
        type: string
      description: Domain where the policy set was assigned (workspace slug or "global")
  responses:
    "204":
      description: Policy set removed successfully
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
