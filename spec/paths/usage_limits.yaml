get:
  summary: List all usage limits on policy sets
  operationId: listUsageLimits
  tags:
    - access
  parameters:
    - in: query
      name: policy_set_name
      schema:
        type: string
      description: Filter by policy set name
  responses:
    "200":
      description: List of usage limits
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../openapi.yaml#/components/schemas/UsageLimit"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"

post:
  summary: Create a new usage limit on a policy set
  operationId: createUsageLimit
  tags:
    - access
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/UsageLimit"
  responses:
    "201":
      description: Usage limit created successfully
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/UsageLimit"
    default:
      description: Error
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/Error"
