# spec/components/authenticated_tenant.yaml
# Defines the schema for an authenticated tenant session
type: object
additionalProperties: false
properties:
  tenant_uuid:
    type: string
    format: uuid
    description: Unique identifier for the tenant
  tenant_name:
    type: string
    description: Subdomain name of the tenant
  tenant_display_name:
    type: string
    description: Human-readable tenant name
  user_email:
    type: string
    format: email
    description: Email of the authenticated user in this tenant
  last_accessed_at:
    type: string
    format: date-time
    description: Last time the user accessed this tenant
required:
  - tenant_uuid
  - tenant_name
  - tenant_display_name
  - user_email
