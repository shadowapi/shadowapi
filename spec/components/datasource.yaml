type: object
descripton: datasource to data source object representation
additionalProperties: false
properties:
  uuid:
    type: string
    readOnly: true
  user_uuid:
    type: string
    readOnly: true
  type:
    type: string
  name:
    type: string
  is_enabled:
    type: boolean
  provider:
    type: string
  is_oauth_authenticated:
    type: boolean
    readOnly: true
    description: Whether the OAuth datasource has valid authentication tokens (only applicable for email_oauth type)
  created_at:
    type: string
    format: date-time
    readOnly: true
  updated_at:
    format: date-time
    readOnly: true
    type: string
required:
  - name
  - type
  - provider
