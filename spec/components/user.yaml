# spec/components/user.yaml
# Defines the schema for a User in the system
type: object
additionalProperties: false
properties:
  uuid:
    type: string
    description: Unique identifier for the user
    readOnly: true
  email:
    type: string
    format: email
    description: User's primary email address
  password:
    type: string
    description: User's password (hashed)
  first_name:
    type: string
    description: User's first name
  last_name:
    type: string
    description: User's last name
  is_enabled:
    type: boolean
    description: Indicates if the user is enabled
  roles:
    type: array
    description: User's assigned roles with domain information
    readOnly: true
    items:
      type: object
      properties:
        role:
          type: string
          description: Role name
        domain:
          type: string
          description: Domain (workspace slug or 'global')
  meta:
    type: object
    additionalProperties: true
    description: Arbitrary key-value metadata about the user
  created_at:
    type: string
    format: date-time
    description: Timestamp of user creation
    readOnly: true
  updated_at:
    type: string
    format: date-time
    description: Timestamp of last update
    readOnly: true
required:
  - email
  - password
  - first_name
  - last_name
