type: object
properties:
  uuid:
    type: string
    description: Unique identifier
  pipeline_uuid:
    type: string
  schedule_type:
    type: string
  cron_expression:
    type: string
    nullable: true
  run_at:
    type: string
    format: date-time
    nullable: true
  timezone:
    type: string
  next_run:
    type: string
    format: date-time
  last_run:
    type: string
    format: date-time
  is_enabled:
    type: boolean
  is_paused:
    type: boolean
  batch_size:
    type: integer
    description: Number of items to process per scheduled execution
    default: 100
    minimum: 1
    maximum: 10000
  sync_state:
    type: string
    description: Current sync state for bi-directional fetch
    enum:
      - initial
      - sync_recent
      - sync_historical
      - sync_complete
    default: initial
  last_sync_timestamp:
    type: string
    format: date-time
    nullable: true
    description: Most recent message timestamp synced
  oldest_sync_timestamp:
    type: string
    format: date-time
    nullable: true
    description: Oldest message timestamp synced (for historical backfill)
  cutoff_date:
    type: string
    format: date-time
    nullable: true
    description: Stop historical sync before this date
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
required:
  - pipeline_uuid
  - schedule_type