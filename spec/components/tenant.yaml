# spec/components/tenant.yaml
# Defines the schema for a Tenant in the multi-tenant system
type: object
additionalProperties: false
properties:
  uuid:
    type: string
    format: uuid
    description: Unique identifier for the tenant
    readOnly: true
  name:
    type: string
    description: Subdomain name (lowercase alphanumeric + hyphens, max 63 chars)
    pattern: "^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$"
    maxLength: 63
  display_name:
    type: string
    description: Human-readable tenant name
    maxLength: 255
  is_enabled:
    type: boolean
    description: Whether the tenant is active
  settings:
    type: object
    additionalProperties: true
    description: Tenant-specific configuration
  created_at:
    type: string
    format: date-time
    description: Timestamp of tenant creation
    readOnly: true
  updated_at:
    type: string
    format: date-time
    description: Timestamp of last update
    readOnly: true
required:
  - name
  - display_name
