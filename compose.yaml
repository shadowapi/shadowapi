include:
  - devops/compose/infra/compose.yaml
  - devops/compose/auth/compose.yaml
  - devops/compose/tools/compose.yaml

services:
  frontend:
    build:
      context: .
      dockerfile: devops/docker/frontend/dev.Dockerfile
    develop:
      watch:
        - action: sync
          path: ./front
          target: /app
          ignore:
            - node_modules
        - action: rebuild
          path: ./front/package.json
    labels:
      - traefik.enable=true
      # App subdomain - frontend SPA (CSR)
      - traefik.http.routers.shadowapi-front.rule=Host(`${BE_APP_SUBDOMAIN}.${BE_DOMAIN}`)
      - traefik.http.routers.shadowapi-front.entrypoints=${BE_TRAEFIK_ENTRYPOINT}
      - traefik.http.services.shadowapi-front.loadbalancer.server.port=5173
    restart: always

  ssr:
    build:
      context: .
      dockerfile: devops/docker/ssr/dev.Dockerfile
    develop:
      watch:
        - action: sync
          path: ./front
          target: /app
          ignore:
            - node_modules
        - action: rebuild
          path: ./front/package.json
    labels:
      - traefik.enable=true
      # Root domain routes all SSR traffic (public pages)
      - traefik.http.routers.shadowapi-ssr.rule=Host(`${BE_DOMAIN}`)
      - traefik.http.routers.shadowapi-ssr.entrypoints=${BE_TRAEFIK_ENTRYPOINT}
      - traefik.http.services.shadowapi-ssr.loadbalancer.server.port=3000
    restart: always

  backend:
    build:
      context: .
      dockerfile: devops/docker/backend/dev.Dockerfile
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      traefik:
        condition: service_started
    environment:
      - BE_HOST=${BE_HOST}
      - BE_PORT=${BE_PORT}
      - BE_DB_URI=${BE_DB_URI}
      - BE_LOG_LEVEL=${BE_LOG_LEVEL}
      - BE_QUEUE_URL=${BE_QUEUE_URL}
      - BE_QUEUE_PREFIX=${BE_QUEUE_PREFIX}
      - BE_HYDRA_PUBLIC_URL=${BE_HYDRA_PUBLIC_URL}
      - BE_HYDRA_ADMIN_URL=${BE_HYDRA_ADMIN_URL}
      - BE_OAUTH2_SPA_CLIENT_ID=${BE_OAUTH2_SPA_CLIENT_ID}
      - BE_JWKS_CACHE_DURATION=${BE_JWKS_CACHE_DURATION}
      - BE_INIT_ADMIN_EMAIL=${BE_INIT_ADMIN_EMAIL}
      - BE_INIT_ADMIN_PASSWORD=${BE_INIT_ADMIN_PASSWORD}
      - BE_BASE_URL=http://${BE_DOMAIN}
      - BE_API_BASE_URL=http://${BE_API_SUBDOMAIN}.${BE_DOMAIN}
      - BE_CSR_BASE_URL=http://${BE_APP_SUBDOMAIN}.${BE_DOMAIN}
      - BE_CORS_ALLOWED_ORIGINS=${BE_CORS_ALLOWED_ORIGINS}
      - BE_OAUTH2_COOKIE_DOMAIN=${BE_OAUTH2_COOKIE_DOMAIN}
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - backend/tmp/
        - action: rebuild
          path: ./backend/go.mod
        - action: rebuild
          path: ./backend/go.sum
    labels:
      - traefik.enable=true
      # API subdomain routes all backend traffic
      - traefik.http.routers.shadowapi-api.rule=Host(`${BE_API_SUBDOMAIN}.${BE_DOMAIN}`)
      - traefik.http.routers.shadowapi-api.entrypoints=${BE_TRAEFIK_ENTRYPOINT}
      - traefik.http.services.shadowapi-api.loadbalancer.server.port=8080
    restart: always

  backend-loader:
    build:
      context: .
      dockerfile: devops/docker/loader/Dockerfile
    environment:
      - BE_HOST=${BE_HOST}
      - BE_DB_URI=${BE_DB_URI}
      - BE_LOG_LEVEL=${BE_LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # gRPC to NATS bridge for distributed workers
  grpc2nats:
    build:
      context: .
      dockerfile: devops/docker/grpc2nats/Dockerfile
    environment:
      - G2N_DB_URI=${BE_DB_URI}
      - G2N_NATS_URL=${BE_QUEUE_URL}
      - G2N_NATS_PREFIX=${BE_QUEUE_PREFIX}
      - G2N_GRPC_HOST=0.0.0.0
      - G2N_GRPC_PORT=9090
      - G2N_LOG_LEVEL=${BE_LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    labels:
      - traefik.enable=true
      # RPC subdomain for gRPC traffic
      - traefik.http.routers.shadowapi-rpc.rule=Host(`${BE_RPC_SUBDOMAIN}.${BE_DOMAIN}`)
      - traefik.http.routers.shadowapi-rpc.entrypoints=${BE_TRAEFIK_ENTRYPOINT}
      - traefik.http.services.shadowapi-rpc.loadbalancer.server.port=9090
      - traefik.http.services.shadowapi-rpc.loadbalancer.server.scheme=h2c
    restart: always

  # Distributed gRPC worker
  # Enrollment is handled automatically by bootstrap.sh
  # Worker will wait for credentials if WORKER_ID is empty
  worker:
    build:
      context: .
      dockerfile: devops/docker/worker/Dockerfile
    environment:
      - WORKER_SERVER=grpc2nats:9090
      - WORKER_ID=${WORKER_ID:-}
      - WORKER_SECRET=${WORKER_SECRET:-}
      - WORKER_LOG_LEVEL=${WORKER_LOG_LEVEL:-info}
      - WORKER_HEARTBEAT_INTERVAL=${WORKER_HEARTBEAT_INTERVAL:-30}
      - WORKER_CAPACITY=${WORKER_CAPACITY:-10}
    depends_on:
      grpc2nats:
        condition: service_started
    restart: unless-stopped

