services:
  traefik:
    image: traefik:v3.1
    container_name: sa-traefik
    command:
      - --log.level=DEBUG
      - --accesslog=true
      - --accesslog.fields.defaultmode=keep
      - --accesslog.fields.names.StartUTC=keep
      - --accesslog.fields.names.Duration=keep
      - --accesslog.fields.names.ResponseStatus=keep
      - --accesslog.fields.names.RequestMethod=keep
      - --accesslog.fields.names.RequestPath=keep
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entryPoints.web.address=:80
    ports:
      - 80:80
      - 8800:8080
    depends_on:
      - frontend
    networks:
      - shadowapi
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
  frontend:
    build:
      context: front
      dockerfile: ../devops/frontend.dev.Dockerfile
    container_name: sa-frontend
    environment:
      - VITE_ZITADEL_URL=http://auth.${DOMAIN}
    networks:
      - shadowapi
    #    volumes:
    #      - ./front:/app
    #      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./front
          target: /app
          ignore:
            - node_modules
        - action: rebuild
          path: ./front/package.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.shadowapi-front.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.shadowapi-front.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.services.shadowapi-front.loadbalancer.server.port=5173
  backend:
    build:
      context: .
      dockerfile: devops/backend.dev.Dockerfile
    container_name: sa-backend
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      zitadel:
        condition: service_started
    environment:
      - SA_HOST=0.0.0.0
      - SA_DB_URI=postgres://shadowapi:shadowapi@db/shadowapi
      - SA_LOG_LEVEL=DEBUG
      - SA_QUEUE_URL=nats://nats:4222
      - SA_QUEUE_PREFIX=shadowapi
      - SA_AUTH_ZITADEL_INSTANCE_URL=http://zitadel:8080
      - SA_AUTH_ZITADEL_REDIRECT_URI=http://localtest.me/auth/callback
    networks:
      - shadowapi
    volumes:
      - ./backend:/app/
      - ./spec:/spec/
    labels:
      - traefik.enable=true
      - traefik.http.routers.shadowapi-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/`) || PathPrefix(`/assets/`) || PathPrefix(`/auth/`))
      - traefik.http.routers.shadowapi-api.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.services.shadowapi-api.loadbalancer.server.port=8080

  backend-loader:
    build:
      context: .
      dockerfile: devops/backend-loader.Dockerfile
    container_name: sa-backend-loader
    environment:
      - SA_HOST=0.0.0.0
      - SA_DB_URI=postgres://shadowapi:shadowapi@db/shadowapi
      - SA_LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shadowapi

  db:
    image: postgres:16-alpine
    container_name: sa-db
    restart: always
    command: ["postgres", "-c", "log_statement=all"]
    networks:
      - shadowapi
    volumes:
      - ./devops/db-init.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=shadowapi
      - POSTGRES_USER=shadowapi
      - POSTGRES_DB=shadowapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "shadowapi"]
      interval: "10s"
      timeout: "30s"
      retries: 5
      start_period: "20s"
  db-migrate:
    container_name: sa-db-migrate
    image: arigaio/atlas:0.30.0
    networks:
      - shadowapi
    command: >
      schema apply
      --url postgres://shadowapi:shadowapi@db:5432/shadowapi?sslmode=disable
      --dev-url postgres://shadowapi:shadowapi@db:5432/shadowapi_schema?sslmode=disable
      --to file://schema.sql
      --auto-approve
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/schema.sql:/schema.sql
  nats:
    image: nats:2.11.1
    container_name: sa-nats
    command: ["-js", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - shadowapi

  zitadel:
    image: ghcr.io/zitadel/zitadel:stable
    container_name: sa-zitadel
    command: start-from-init --masterkey "shadowapi-dev-masterkey-32bytes!" --tlsMode disabled --config /zitadel-config.yaml --steps /zitadel-init-steps.yaml
    environment:
      - ZITADEL_DATABASE_POSTGRES_HOST=db
      - ZITADEL_DATABASE_POSTGRES_PORT=5432
      - ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel
      - ZITADEL_DATABASE_POSTGRES_USER_USERNAME=zitadel
      - ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=zitadel
      - ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE=disable
      - ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=shadowapi
      - ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=shadowapi
      - ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE=disable
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - shadowapi
    volumes:
      - ./devops/zitadel-config.yaml:/zitadel-config.yaml:ro
      - ./devops/zitadel-init-steps.yaml:/zitadel-init-steps.yaml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.zitadel.rule=Host(`auth.${DOMAIN}`)
      - traefik.http.routers.zitadel.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.services.zitadel.loadbalancer.server.port=8080

volumes:
  postgres_data:
    driver: local
  node_modules:
    driver: local
networks:
  shadowapi:
