root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/shadowapi"
  cmd = "go build -o ./tmp/shadowapi ./cmd/shadowapi"
  args_bin = ["serve"]
  delay = 1000
  exclude_dir = ["bin", "tmp", "ui", "cmd/shadowapi/cmd/static"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "yaml"]
  kill_delay = "0s"
  log = "build-errors.log"
  stop_on_error = true

[log]
  main_only = true
  silent = true
  time = false
  level = "error"

[misc]
  clean_on_exit = false
