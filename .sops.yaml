# SOPS configuration for MeshPump
# Uses age encryption for secrets management
#
# To add a new team member:
#   1. They run: age-keygen -o ~/.config/sops/age/keys.txt
#   2. They share their public key (starts with "age1...")
#   3. Add it below, separated by comma
#   4. Run: make secrets-rotate
#
# Private keys are stored at: ~/.config/sops/age/keys.txt

creation_rules:
  # Production secrets (Uncloud deployment)
  - path_regex: devops/uncloud/\.env(\.enc)?$
    age: >-
      age1dry62egkzstua63ts4nextwjsns5ss39hfculagkemgd30lqhcuqncduae
